

<div class="min-h-screen relative overflow-hidden flex items-center justify-center px-4 py-12">
  <!-- Animated Background -->
  <div class="bg-particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Gradient Orbs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-0 -left-4 w-96 h-96 bg-teal-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
    <div class="absolute -top-4 -right-4 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-8 left-20 w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
  </div>

  <!-- Register Card -->
  <div class="relative z-10 w-full max-w-2xl slide-in-up">
    <div class="glass-card p-8 shadow-2xl">
      
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-teal-500 via-cyan-500 to-blue-500 mb-4 float-animation">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
          </svg>
        </div>
        <h2 class="text-4xl font-bold gradient-text mb-2">
          Join RideShare
        </h2>
        <p class="text-gray-400 text-sm">Create your account and start sharing rides</p>
      </div>

      <!-- Register Form -->
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <!-- Two Column Layout for Name Fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          
          <!-- Username -->
          <div class="space-y-2">
            <label for="username" class="block text-sm font-medium text-gray-300 flex items-center gap-2">
              <svg class="w-4 h-4 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
              Username
            </label>
            <input 
              id="username" 
              formControlName="username" 
              type="text" 
              required
              class="input-glow w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 focus:outline-none"
              placeholder="johndoe">
            <p *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" 
               class="text-xs text-red-400 flex items-center gap-1 mt-1">
              <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
              </svg>
              Min 3 characters required
            </p>
          </div>

          <!-- Email -->
          <div class="space-y-2">
            <label for="email" class="block text-sm font-medium text-gray-300 flex items-center gap-2">
              <svg class="w-4 h-4 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
              </svg>
              Email
            </label>
            <input 
              id="email" 
              formControlName="email" 
              type="email" 
              required
              class="input-glow w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 focus:outline-none"
              placeholder="john@student.com">
            <p *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" 
               class="text-xs text-red-400 flex items-center gap-1 mt-1">
              <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
              </svg>
              Valid email required
            </p>
          </div>
        </div>

        <!-- Phone & Password Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          
          <!-- Phone Number -->
          <div class="space-y-2">
            <label for="phoneNumber" class="block text-sm font-medium text-gray-300 flex items-center gap-2">
              <svg class="w-4 h-4 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
              </svg>
              Phone Number
            </label>
            <input 
              id="phoneNumber" 
              formControlName="phoneNumber" 
              type="tel" 
              required
              class="input-glow w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 focus:outline-none"
              placeholder="1234567890">
            <p *ngIf="registerForm.get('phoneNumber')?.invalid && registerForm.get('phoneNumber')?.touched" 
               class="text-xs text-red-400 flex items-center gap-1 mt-1">
              <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
              </svg>
              10 digits required
            </p>
          </div>

          <!-- Password -->
          <div class="space-y-2">
            <label for="password" class="block text-sm font-medium text-gray-300 flex items-center gap-2">
              <svg class="w-4 h-4 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
              Password
            </label>
            <input 
              id="password" 
              formControlName="password" 
              type="password" 
              required
              class="input-glow w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 focus:outline-none"
              placeholder="Min 6 characters">
            <p *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" 
               class="text-xs text-red-400 flex items-center gap-1 mt-1">
              <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
              </svg>
              Min 6 characters
            </p>
          </div>
        </div>

        <!-- Role Selection -->
        <div class="space-y-3">
          <label class="block text-sm font-medium text-gray-300 flex items-center gap-2">
            <svg class="w-4 h-4 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            I want to be a:
          </label>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <!-- Rider Option -->
            <label class="relative cursor-pointer">
              <input type="radio" formControlName="role" value="RIDER" class="peer sr-only">
              <div class="glass-card p-4 text-center border-2 border-transparent peer-checked:border-indigo-500 peer-checked:bg-indigo-500/10 transition-all duration-300 hover:border-indigo-300">
                <div class="text-3xl mb-2">🏍️</div>
                <p class="font-semibold text-white">Rider</p>
                <p class="text-xs text-gray-400 mt-1">Offer rides</p>
              </div>
            </label>

            <!-- Pillion Option -->
            <label class="relative cursor-pointer">
              <input type="radio" formControlName="role" value="PILLION" class="peer sr-only">
              <div class="glass-card p-4 text-center border-2 border-transparent peer-checked:border-teal-500 peer-checked:bg-teal-500/10 transition-all duration-300 hover:border-teal-300">
                <div class="text-3xl mb-2">🎒</div>
                <p class="font-semibold text-white">Pillion</p>
                <p class="text-xs text-gray-400 mt-1">Find rides</p>
              </div>
            </label>

            <!-- Both Option -->
            <label class="relative cursor-pointer">
              <input type="radio" formControlName="role" value="BOTH" class="peer sr-only" checked>
              <div class="glass-card p-4 text-center border-2 border-transparent peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all duration-300 hover:border-purple-300">
                <div class="text-3xl mb-2">⚡</div>
                <p class="font-semibold text-white">Both</p>
                <p class="text-xs text-gray-400 mt-1">Do both!</p>
              </div>
            </label>
          </div>
        </div>

        <!-- Messages -->
        <div *ngIf="errorMessage" class="scale-in">
          <div class="bg-red-500/20 border-2 border-red-500 text-red-200 px-4 py-3 rounded-xl flex items-center gap-3">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="text-sm font-medium">{{ errorMessage }}</span>
          </div>
        </div>

        <div *ngIf="successMessage" class="scale-in">
          <div class="bg-green-500/20 border-2 border-green-500 text-green-200 px-4 py-3 rounded-xl flex items-center gap-3">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="text-sm font-medium">{{ successMessage }}</span>
          </div>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          [disabled]="!registerForm.valid || isLoading"
          class="btn-gradient-teal w-full py-4 rounded-xl text-white font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300">
          <span *ngIf="!isLoading" class="flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
            </svg>
            Create Account
          </span>
          <span *ngIf="isLoading" class="flex items-center justify-center gap-3">
            <div class="spinner-small"></div>
            Creating account...
          </span>
        </button>

        <!-- Login Link -->
        <div class="text-center pt-4">
          <a routerLink="/login" 
             class="inline-flex items-center gap-2 text-teal-400 hover:text-teal-300 font-medium transition-colors duration-300 group">
            <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"></path>
            </svg>
            <span>Already have an account? Sign in</span>
          </a>
        </div>
      </form>

    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-gray-500 text-sm">
      <p>🔒 Your data is secure and encrypted</p>
    </div>
  </div>
</div>

<style>
.spinner-small {
  width: 20px;
  height: 20px;
  border: 3px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
</style>
